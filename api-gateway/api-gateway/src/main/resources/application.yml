server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**, /api/v1/auth/**, /api/v1/users/**, /oauth2/**, /login/**
          filters:
            - AuthenticationFilter
        - id: post-service
          uri: ${POST_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/posts/**, /api/v1/taxonomy/**, /api/v1/categories/**, /api/v1/tags/**, /api/v1/authors/**, /api/v1/analytics/**
          filters:
            - AuthenticationFilter
        - id: comment-service
          uri: ${COMMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/comments/**
          filters:
            - AuthenticationFilter
        - id: messaging-service
          uri: ${MESSAGING_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/newsletter/**, /api/v1/notifications/**, /api/v1/messaging/**
          filters:
            - AuthenticationFilter
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/payments/**
          filters:
            - AuthenticationFilter
        - id: media-service
          uri: ${MEDIA_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/media/**, /media/**
          filters:
            - AuthenticationFilter
            - RewritePath=^/media/(?<segment>.*), /api/v1/media/${segment}

app:
  jwt:
    secret: "ASDFGHJKJHGFD2345678IUYTRESDFGHNMNHG3456YUYTRESDFBNBVFDWERTYUHGFV"
    expiration-ms: 3600000

eureka:
  client:
    should-unregister-on-shutdown: false
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    hostname: localhost
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
