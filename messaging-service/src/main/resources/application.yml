    password: inkwell123

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME:ramrudhra11@gmail.com}
    password: ${SMTP_PASSWORD:flop ldmg hlpu tvlm}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
