services:
  redis:
    image: redis:7-alpine
    container_name: inkwell-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - inkwell-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: inkwell-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-inkwell}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-inkwell123}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - inkwell-net

  discovery-server:
    build:
      context: ./discovery-server/discovery-server
    container_name: inkwell-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      EUREKA_INSTANCE_HOSTNAME: discovery-server
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    networks:
      - inkwell-net

  auth-service:
    build:
      context: ./auth-service/auth-service
    container_name: inkwell-auth-service
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
      messaging-service:
        condition: service_started
      post-service:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-host.docker.internal}:${MYSQL_PORT:-3306}/inkwell_auth?createDatabaseIfNotExist=true&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootroot}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: auth-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
      APP_MESSAGING_SERVICE_URL: http://messaging-service:8087
      APP_POST_SERVICE_URL: http://post-service:8082
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    networks:
      - inkwell-net

  post-service:
    build:
      context: ./post-service/post-service
    container_name: inkwell-post-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      discovery-server:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-host.docker.internal}:${MYSQL_PORT:-3306}/inkwell_post?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootroot}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: post-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    networks:
      - inkwell-net

  comment-service:
    build:
      context: ./comment-service/comment-service
    container_name: inkwell-comment-service
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-host.docker.internal}:${MYSQL_PORT:-3306}/inkwell_comment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootroot}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: comment-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    networks:
      - inkwell-net

  category-service:
    build:
      context: ./category-service/category-service
    container_name: inkwell-category-service
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-host.docker.internal}:${MYSQL_PORT:-3306}/inkwell_category?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootroot}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: category-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    networks:
      - inkwell-net

  media-service:
    build:
      context: ./media-service/media-service
    container_name: inkwell-media-service
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-host.docker.internal}:${MYSQL_PORT:-3306}/inkwell_media?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootroot}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: media-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - inkwell-net

  payment-service:
    build:
      context: ./payment-service
    container_name: inkwell-payment-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    networks:
      - inkwell-net

  messaging-service:
    build:
      context: ./messaging-service
    container_name: inkwell-messaging-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_started
      discovery-server:
        condition: service_started
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST:-host.docker.internal}:${MYSQL_PORT:-3306}/inkwell_messaging?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootroot}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-inkwell}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-inkwell123}
      SPRING_MAIL_USERNAME: ${SMTP_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SMTP_PASSWORD:-}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: messaging-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    networks:
      - inkwell-net

  api-gateway:
    build:
      context: ./api-gateway/api-gateway
    container_name: inkwell-api-gateway
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
      auth-service:
        condition: service_started
      post-service:
        condition: service_started
      comment-service:
        condition: service_started
      media-service:
        condition: service_started
      payment-service:
        condition: service_started
      messaging-service:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      AUTH_SERVICE_URL: http://auth-service:8081
      POST_SERVICE_URL: http://post-service:8082
      COMMENT_SERVICE_URL: http://comment-service:8083
      MESSAGING_SERVICE_URL: http://messaging-service:8087
      PAYMENT_SERVICE_URL: http://payment-service:8086
      MEDIA_SERVICE_URL: http://media-service:8085
    networks:
      - inkwell-net

networks:
  inkwell-net:
    driver: bridge
